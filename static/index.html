<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#FAFAFA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="FreezeWise — AI-powered food storage guide and smart fridge manager">
<title>FreezeWise</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FreezeWise — Editorial Magazine Design
   Production UI — Single-file SPA
   ============================================================ */

/* === Reset === */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

/* === CSS Custom Properties === */
:root {
  --bg: #FAFAFA;
  --bg-white: #FFFFFF;
  --text: #111111;
  --text-secondary: #555555;
  --text-tertiary: #999999;
  --border: #E5E5E5;
  --border-dark: #111111;
  --accent: #111111;
  --accent-tint: transparent;
  --red: #D32F2F;
  --orange: #E65100;
  --green: #2E7D32;
  --blue: #1565C0;
  --radius: 0px;
  --nav-height: 68px;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --transition-speed: 0.35s;
}

/* === Theme: Green Garden === */
[data-theme="green"] {
  --accent: #2D6A4F;
  --accent-tint: rgba(45, 106, 79, 0.04);
}

/* === Theme: Warm Kitchen === */
[data-theme="warm"] {
  --accent: #8B5E3C;
  --accent-tint: rgba(139, 94, 60, 0.04);
}

/* === Theme: Fruity Fresh === */
[data-theme="colorful"] {
  --accent: #D35400;
  --accent-tint: rgba(211, 84, 0, 0.04);
}

/* === Theme: Neutral Clean === */
[data-theme="neutral"] {
  --accent: #111111;
  --accent-tint: transparent;
}

/* === Body === */
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  max-width: 600px;
  margin: 0 auto;
  min-height: 100dvh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-height) + 24px);
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition-speed), color var(--transition-speed);
}

/* === Masthead === */
.masthead {
  padding: 52px 20px 0;
  border-bottom: 3px solid var(--text);
  position: relative;
  background: var(--accent-tint);
  transition: background var(--transition-speed);
}

.masthead-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.masthead-date {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 500;
}

.masthead-issue {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 500;
}

.logo-text {
  font-family: var(--serif);
  font-size: 38px;
  text-align: center;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1.1;
  padding: 8px 0;
}

.masthead-tagline {
  text-align: center;
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 3px;
  padding-bottom: 12px;
  font-weight: 400;
  transition: color var(--transition-speed);
}

/* === Screen Container === */
.screen {
  display: none;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.screen.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* === Search Section === */
.search-section {
  padding: 16px 20px 12px;
}

.search-bar {
  display: flex;
  align-items: center;
  border: 1.5px solid var(--text);
  padding: 10px 14px;
  gap: 10px;
  transition: all 0.2s;
  background: var(--bg);
}

.search-bar:focus-within {
  background: var(--bg-white);
  border-color: var(--accent);
}

.search-bar input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  outline: none;
  font-weight: 400;
  letter-spacing: 0.3px;
}

.search-bar input::placeholder {
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 11px;
}

.search-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent);
  border-left: 1.5px solid var(--accent);
  padding-left: 10px;
  white-space: nowrap;
  cursor: pointer;
  transition: color var(--transition-speed);
}

/* === Categories === */
.categories {
  padding: 0 20px 16px;
  border-bottom: 1px solid var(--border);
}

.categories-scroll {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.categories-scroll::-webkit-scrollbar { display: none; }

.cat-tab {
  flex-shrink: 0;
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: inherit;
  transition: all 0.2s;
}

.cat-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

.cat-tab:hover:not(.active) {
  color: var(--text-secondary);
}

/* === Section Header === */
.section-header {
  padding: 20px 20px 4px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.section-count {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--text-secondary);
}

/* === Product Cards === */
.products-list {
  padding: 0 20px;
  display: flex;
  flex-direction: column;
}

.product-card {
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
}

.product-card:last-child { border-bottom: none; }

.product-card:active {
  background: rgba(0,0,0,0.02);
}

.card-row-1 {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}

.card-left {
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
  min-width: 0;
}

.product-num {
  font-family: var(--serif);
  font-size: 32px;
  color: var(--border);
  line-height: 1;
  min-width: 28px;
  flex-shrink: 0;
}

.product-emoji {
  font-size: 32px;
  line-height: 1;
  flex-shrink: 0;
}

.product-name {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.1;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-badge {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 10px;
  border: 1px solid;
  flex-shrink: 0;
  margin-left: 8px;
}

.card-badge.fresh { color: var(--green); border-color: var(--green); }
.card-badge.expiring { color: var(--orange); border-color: var(--orange); }
.card-badge.expired { color: var(--red); border-color: var(--red); background: rgba(211,47,47,0.05); }
.card-badge.ok { color: var(--blue); border-color: var(--blue); }

.card-row-2 {
  display: flex;
  gap: 20px;
  margin-bottom: 8px;
  padding-left: 42px;
}

.storage-item {
  display: flex;
  flex-direction: column;
}

.storage-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-bottom: 1px;
}

.storage-value {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--text);
  letter-spacing: -0.3px;
}

.product-tip {
  padding-left: 42px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  font-weight: 300;
  font-style: italic;
}

.add-to-fridge-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  margin-left: 42px;
  margin-top: 10px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent);
  background: none;
  border: 1.5px solid var(--accent);
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}

.add-to-fridge-btn:hover {
  background: var(--accent);
  color: var(--bg-white);
}

.add-to-fridge-btn:active {
  transform: scale(0.97);
}

/* === Pull Quote === */
.pull-quote {
  padding: 20px 20px;
  text-align: center;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin: 4px 0;
}

.pull-quote-text {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--text);
  font-style: italic;
  line-height: 1.3;
  letter-spacing: -0.3px;
}

.pull-quote-attr {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 6px;
  font-weight: 500;
}

/* === Loading Skeleton === */
.skeleton {
  position: relative;
  overflow: hidden;
  background: var(--border);
  border-radius: 2px;
}

.skeleton::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.skeleton-card {
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}

.skeleton-line {
  height: 14px;
  margin-bottom: 8px;
}

.skeleton-line.w60 { width: 60%; }
.skeleton-line.w40 { width: 40%; }
.skeleton-line.w80 { width: 80%; }
.skeleton-line.w30 { width: 30%; }
.skeleton-line.h24 { height: 24px; }
.skeleton-line.h18 { height: 18px; }

/* === Search Loading & Empty States === */
.state-message {
  padding: 48px 20px;
  text-align: center;
}

.state-message-icon {
  font-size: 48px;
  margin-bottom: 12px;
  line-height: 1;
}

.state-message-title {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--text);
  margin-bottom: 6px;
}

.state-message-desc {
  font-size: 13px;
  color: var(--text-tertiary);
  line-height: 1.6;
  max-width: 280px;
  margin: 0 auto;
}

/* === Error Toast === */
.toast {
  position: fixed;
  top: 56px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--red);
  color: #fff;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.3px;
  z-index: 9999;
  max-width: 360px;
  text-align: center;
  transition: transform 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}

.toast.success {
  background: var(--green);
}

/* === Camera FAB === */
.camera-fab {
  position: fixed;
  bottom: calc(var(--nav-height) + 32px);
  right: calc(50% - 280px);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--text);
  color: var(--bg);
  border: none;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  cursor: pointer;
  z-index: 100;
  transition: transform 0.15s, opacity 0.2s;
}

.camera-fab:active { transform: scale(0.93); }
.camera-fab.hidden { opacity: 0; pointer-events: none; }

@media (max-width: 600px) {
  .camera-fab {
    right: 20px;
  }
}

/* === Bottom Navigation === */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 600px;
  background: var(--bg-white);
  border-top: 2px solid var(--text);
  display: flex;
  padding: 0 0 env(safe-area-inset-bottom, 0px);
  z-index: 200;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 0 8px;
  cursor: pointer;
  text-decoration: none;
  position: relative;
  background: none;
  border: none;
  font-family: inherit;
  transition: color 0.15s;
}

.nav-item:not(:last-child) {
  border-right: 1px solid var(--border);
}

.nav-item .nav-label {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-family: var(--sans);
}

.nav-item .nav-icon { font-size: 18px; line-height: 1; }

.nav-item.active { color: var(--accent); }

.nav-item.active::before {
  content: '';
  position: absolute;
  top: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
  transition: background var(--transition-speed);
}

.nav-item:not(.active) { color: var(--text-tertiary); }

.nav-badge {
  position: absolute;
  top: 4px;
  right: calc(50% - 18px);
  background: var(--red);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

.nav-badge:empty { display: none; }

/* === Horizontal Rules === */
.rule { width: 100%; height: 1px; background: var(--border); }
.rule.thick { height: 3px; background: var(--text); }

/* ============================
   SCREEN: MY FRIDGE
   ============================ */

.fridge-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--border);
}

.fridge-stat {
  padding: 16px 12px;
  text-align: center;
  border-right: 1px solid var(--border);
}

.fridge-stat:last-child { border-right: none; }

.fridge-stat-value {
  font-family: var(--serif);
  font-size: 28px;
  color: var(--text);
  line-height: 1;
}

.fridge-stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-top: 4px;
}

.fridge-stat-value.warn { color: var(--orange); }
.fridge-stat-value.danger { color: var(--red); }

.fridge-theme-bar {
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

.theme-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  transition: background var(--transition-speed);
}

.theme-name {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.fridge-items {
  padding: 0 20px;
}

.fridge-item {
  display: flex;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  gap: 14px;
  position: relative;
}

.fridge-item-icon {
  font-size: 28px;
  flex-shrink: 0;
}

.fridge-item-info {
  flex: 1;
  min-width: 0;
}

.fridge-item-name {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--text);
  line-height: 1.2;
}

.fridge-item-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  display: flex;
  gap: 12px;
  margin-top: 2px;
}

.fridge-item-location {
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
}

.fridge-item-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}

.fridge-days-left {
  font-family: var(--serif);
  font-size: 20px;
  line-height: 1;
}

.fridge-days-left.fresh { color: var(--green); }
.fridge-days-left.expiring { color: var(--orange); }
.fridge-days-left.expired { color: var(--red); }

.fridge-days-unit {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.fridge-remove-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-tertiary);
  font-size: 14px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}

.fridge-remove-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

.fridge-empty {
  padding: 60px 20px;
  text-align: center;
}

.fridge-empty-icon { font-size: 64px; margin-bottom: 16px; }

.fridge-empty-title {
  font-family: var(--serif);
  font-size: 24px;
  color: var(--text);
  margin-bottom: 8px;
}

.fridge-empty-desc {
  font-size: 13px;
  color: var(--text-tertiary);
  line-height: 1.6;
}

/* ============================
   SCREEN: RECIPES
   ============================ */

.recipes-header {
  padding: 20px;
}

.recipes-generate-btn {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: var(--bg-white);
  border: none;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.15s;
}

.recipes-generate-btn:hover {
  opacity: 0.9;
}

.recipes-generate-btn:active {
  transform: scale(0.99);
}

.recipes-generate-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.recipes-list {
  padding: 0 20px;
}

.recipe-card {
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}

.recipe-card:last-child { border-bottom: none; }

.recipe-num {
  font-family: var(--serif);
  font-size: 32px;
  color: var(--border);
  line-height: 1;
  margin-bottom: 4px;
}

.recipe-title {
  font-family: var(--serif);
  font-size: 24px;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  line-height: 1.2;
}

.recipe-meta {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
}

.recipe-meta-item {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.recipe-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-tertiary);
  font-weight: 600;
  margin-bottom: 6px;
  margin-top: 12px;
}

.recipe-ingredients {
  list-style: none;
  padding: 0;
}

.recipe-ingredients li {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.8;
  padding-left: 16px;
  position: relative;
}

.recipe-ingredients li::before {
  content: '\2014';
  position: absolute;
  left: 0;
  color: var(--text-tertiary);
}

.recipe-steps {
  list-style: none;
  padding: 0;
  counter-reset: step;
}

.recipe-steps li {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  padding-left: 28px;
  position: relative;
  margin-bottom: 6px;
  counter-increment: step;
}

.recipe-steps li::before {
  content: counter(step) '.';
  position: absolute;
  left: 0;
  font-family: var(--serif);
  font-size: 16px;
  color: var(--accent);
  font-weight: 400;
}

.recipe-uses-expiring {
  display: inline-block;
  margin-top: 8px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--orange);
  border: 1px solid var(--orange);
  padding: 3px 8px;
}

.recipes-loading {
  padding: 40px 20px;
  text-align: center;
}

.recipes-loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   i18n ENGINE
   ============================================================ */
function t(key) {
  const parts = key.split('.');
  let obj = I18N[State.locale];
  for (const p of parts) {
    if (!obj || typeof obj !== 'object') return key;
    obj = obj[p];
  }
  return obj || key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (el.tagName === 'INPUT') {
      el.placeholder = val;
    } else {
      el.textContent = val;
    }
  });
  // Search placeholder
  const si = document.getElementById('searchInput');
  if (si) si.placeholder = t('search.placeholder');
  // Masthead
  updateMasthead();
}

function updateMasthead() {
  const d = new Date();
  const months = {
    en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    ru: ['Января','Февраля','Марта','Апреля','Мая','Июня','Июля','Августа','Сентября','Октября','Ноября','Декабря'],
    cn: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']
  };
  const ml = months[State.locale] || months.en;
  const dateStr = State.locale === 'cn'
    ? `${d.getFullYear()}年${ml[d.getMonth()]}${d.getDate()}日`
    : `${ml[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  document.getElementById('mastheadDate').textContent = dateStr;
  document.getElementById('mastheadIssue').textContent = t('masthead.issue');
  // Tagline based on theme
  const themeTaglines = {
    green: 'masthead.taglineGreen',
    warm: 'masthead.taglineWarm',
    colorful: 'masthead.taglineColorful',
    neutral: 'masthead.taglineNeutral'
  };
  document.getElementById('mastheadTagline').textContent = t(themeTaglines[State.currentTheme] || 'masthead.tagline');
}

/* ============================================================
   THEME ENGINE
   ============================================================ */
function applyTheme(themeName) {
  State.currentTheme = themeName;
  document.body.setAttribute('data-theme', themeName);
  // Update settings display
  const el = document.getElementById('settingsCurrentTheme');
  if (el) el.textContent = t('themes.' + themeName);
  // Update theme selector active states
  document.querySelectorAll('#themeSelector .theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === State.themeOverride);
  });
  updateMasthead();
}

function resolveTheme(serverTheme) {
  if (State.themeOverride !== 'auto') {
    applyTheme(State.themeOverride);
  } else {
    applyTheme(serverTheme || 'neutral');
  }
}

/* ============================================================
   API CLIENT
   ============================================================ */
const API = {
  base: '',

  async get(path) {
    const res = await fetch(this.base + path);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  },

  async post(path, body) {
    const res = await fetch(this.base + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  },

  async del(path) {
    const res = await fetch(this.base + path, { method: 'DELETE' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  },

  async patch(path, body) {
    const res = await fetch(this.base + path, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  },

  async postForm(path, formData) {
    const res = await fetch(this.base + path, {
      method: 'POST',
      body: formData
    });
    return res;
  }
};

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg, type = 'error') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type === 'success' ? ' success' : '');
  clearTimeout(toastTimer);
  requestAnimationFrame(() => {
    el.classList.add('visible');
    toastTimer = setTimeout(() => el.classList.remove('visible'), 2500);
  });
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function navigateTo(screen) {
  State.currentScreen = screen;
  // Screens
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const target = document.getElementById('screen' + screen.charAt(0).toUpperCase() + screen.slice(1));
  if (target) {
    target.style.display = 'block';
    requestAnimationFrame(() => target.classList.add('active'));
  }
  // Nav
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.screen === screen);
  });
  // FAB visibility
  const fab = document.getElementById('cameraFab');
  fab.classList.toggle('hidden', screen !== 'search');
  // Pull quote visibility
  const pq = document.getElementById('pullQuote');
  if (pq) pq.style.display = screen === 'search' ? '' : 'none';
  // Load data for screen
  if (screen === 'fridge') loadFridge();
  if (screen === 'recipes') { /* just show current state */ }
  if (screen === 'search' && State.products.length === 0 && !State.searchQuery) loadProducts();
}

/* ============================================================
   SEARCH SCREEN
   ============================================================ */
let searchDebounce = null;

function initSearch() {
  const input = document.getElementById('searchInput');
  const btn = document.getElementById('searchBtn');

  input.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      State.searchQuery = input.value.trim();
      if (State.searchQuery.length > 0) {
        searchProducts(State.searchQuery);
      } else {
        loadProducts();
      }
    }, 300);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      clearTimeout(searchDebounce);
      State.searchQuery = input.value.trim();
      if (State.searchQuery) searchProducts(State.searchQuery);
    }
  });

  btn.addEventListener('click', () => {
    State.searchQuery = input.value.trim();
    if (State.searchQuery) searchProducts(State.searchQuery);
  });
}

async function loadProducts() {
  showSearchLoading(true);
  hideSearchStates();
  try {
    const data = await API.get('/api/products');
    State.products = Array.isArray(data) ? data : (data.products || []);
    filterAndRender();
  } catch (e) {
    showSearchError();
  } finally {
    showSearchLoading(false);
  }
}

async function searchProducts(query) {
  showSearchLoading(true);
  hideSearchStates();
  try {
    const data = await API.get('/api/products/search?q=' + encodeURIComponent(query));
    State.products = data.products || [];
    State.selectedCategory = 'all';
    updateCategoryTabs();
    renderProducts(State.products);
    if (State.products.length === 0) showSearchEmpty();
  } catch (e) {
    showSearchError();
  } finally {
    showSearchLoading(false);
  }
}

async function loadCategories() {
  try {
    const data = await API.get('/api/categories');
    State.categories = Array.isArray(data) ? data : (data.categories || []);
  } catch (e) {
    State.categories = [];
  }
  renderCategoryTabs();
}

function renderCategoryTabs() {
  const container = document.getElementById('categoriesScroll');
  const cats = ['all', ...State.categories.map(c => typeof c === 'string' ? c.toLowerCase() : (c.name || '').toLowerCase())];
  const uniqueCats = [...new Set(cats)];
  // Fallback if API returns nothing
  const defaultCats = ['all', 'vegetables', 'protein', 'dairy', 'fruits', 'grains', 'seafood'];
  const finalCats = uniqueCats.length > 1 ? uniqueCats : defaultCats;

  container.innerHTML = finalCats.map(cat => {
    const label = t('categories.' + cat) || cat;
    const isActive = cat === State.selectedCategory;
    return `<button class="cat-tab${isActive ? ' active' : ''}" data-cat="${cat}">${label}</button>`;
  }).join('');

  container.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      State.selectedCategory = tab.dataset.cat;
      updateCategoryTabs();
      filterAndRender();
    });
  });
}

function updateCategoryTabs() {
  document.querySelectorAll('.cat-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.cat === State.selectedCategory);
  });
}

function filterAndRender() {
  let items = State.products;
  if (State.selectedCategory !== 'all') {
    items = items.filter(p => (p.category || '').toLowerCase() === State.selectedCategory);
  }
  renderProducts(items);
  if (items.length === 0 && State.products.length > 0) {
    showSearchEmpty();
  }
}

function getProductDisplayName(product) {
  if (State.locale === 'ru' && product.name_ru) return product.name_ru;
  if (State.locale === 'cn' && product.name_cn) return product.name_cn;
  return product.name || 'Unknown';
}

function formatStorage(value, unit) {
  if (!value && value !== 0) return t('product.na');
  return value + ' ' + t('product.' + (unit || 'days'));
}

function formatFreezeMonths(months) {
  if (!months && months !== 0) return t('product.na');
  return months + ' ' + t('product.months');
}

function formatFridgeDays(days) {
  if (!days && days !== 0) return t('product.na');
  return days + ' ' + t('product.days');
}

function formatPantryDays(days) {
  if (!days && days !== 0) return t('product.na');
  if (days < 1) return '<1 ' + t('product.days');
  return days + ' ' + t('product.days');
}

function renderProducts(products) {
  const container = document.getElementById('productsList');
  hideSearchStates();

  if (products.length === 0) {
    container.innerHTML = '';
    document.getElementById('searchResultCount').textContent = '';
    document.getElementById('searchResultLabel').textContent = '';
    return;
  }

  document.getElementById('searchResultLabel').textContent = t('search.resultLabel');
  document.getElementById('searchResultCount').textContent = products.length + (products.length === 1 ? ' item' : ' items');

  container.innerHTML = products.map((p, i) => {
    const num = String(i + 1).padStart(2, '0');
    const name = getProductDisplayName(p);
    const icon = p.icon || '🍽️';
    const tip = (p.tips && p.tips.length > 0) ? p.tips[0] : '';
    const freezeVal = formatFreezeMonths(p.freeze_months);
    const fridgeVal = formatFridgeDays(p.fridge_days);
    const pantryVal = formatPantryDays(p.pantry_days);
    const badge = p.can_freeze
      ? `<span class="card-badge ok">${t('detail.canFreeze')}</span>`
      : `<span class="card-badge expired">${t('detail.cannotFreeze')}</span>`;

    return `
      <article class="product-card fade-in" data-product-id="${p.id}" style="animation-delay:${i * 0.04}s">
        <div class="card-row-1">
          <div class="card-left">
            <span class="product-num">${num}</span>
            <span class="product-emoji">${icon}</span>
            <span class="product-name">${escHtml(name)}</span>
          </div>
          ${badge}
        </div>
        <div class="card-row-2">
          <div class="storage-item">
            <span class="storage-label">${t('product.freezer')}</span>
            <span class="storage-value">${freezeVal}</span>
          </div>
          <div class="storage-item">
            <span class="storage-label">${t('product.fridge')}</span>
            <span class="storage-value">${fridgeVal}</span>
          </div>
          <div class="storage-item">
            <span class="storage-label">${t('product.pantry')}</span>
            <span class="storage-value">${pantryVal}</span>
          </div>
        </div>
        ${tip ? `<p class="product-tip">"${escHtml(tip)}"</p>` : ''}
        <button class="add-to-fridge-btn" data-product-id="${p.id}" onclick="event.stopPropagation(); window.FW.quickAdd('${p.id}')">${t('product.addToFridge')}</button>
      </article>`;
  }).join('');

  // Click handlers for product detail
  container.querySelectorAll('.product-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.add-to-fridge-btn')) return;
      const pid = card.dataset.productId;
      openProductDetail(pid);
    });
  });
}

function showSearchLoading(show) {
  document.getElementById('searchSkeletons').style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('productsList').innerHTML = '';
    hideSearchStates();
  }
}

function showSearchEmpty() {
  document.getElementById('searchEmpty').style.display = 'block';
}

function showSearchError() {
  document.getElementById('searchError').style.display = 'block';
}

function hideSearchStates() {
  document.getElementById('searchEmpty').style.display = 'none';
  document.getElementById('searchError').style.display = 'none';
}

async function openProductDetail(productId) {

    State.detailLocation = 'fridge';
    renderDetailModal(product);

function renderDetailModal(p) {
  document.getElementById('detailEmoji').textContent = p.icon || '🍽️';
  document.getElementById('detailName').textContent = getProductDisplayName(p);

  // i18n names
  const names = [];
  if (p.name && State.locale !== 'en') names.push('EN: ' + p.name);
  if (p.name_ru && State.locale !== 'ru') names.push('RU: ' + p.name_ru);
  if (p.name_cn && State.locale !== 'cn') names.push('CN: ' + p.name_cn);
  document.getElementById('detailNamesI18n').textContent = names.join(' \u00b7 ');

  document.getElementById('detailCategory').textContent = (p.category || '').toUpperCase();

  const fb = document.getElementById('detailFreezeBadge');
  fb.textContent = p.can_freeze ? t('detail.canFreeze') : t('detail.cannotFreeze');
  fb.className = 'detail-freeze-badge ' + (p.can_freeze ? 'yes' : 'no');

  document.getElementById('detailFreezer').textContent = formatFreezeMonths(p.freeze_months);
  document.getElementById('detailFridge').textContent = formatFridgeDays(p.fridge_days);
  document.getElementById('detailPantry').textContent = formatPantryDays(p.pantry_days);

  // Freeze how
  const fhSection = document.getElementById('detailFreezeHow');
  if (p.freeze_how) {
    fhSection.style.display = '';
    document.getElementById('detailFreezeHowText').textContent = p.freeze_how;
  } else {
    fhSection.style.display = 'none';
  }

  // Thaw how
  const thSection = document.getElementById('detailThawHow');
  if (p.thaw_how) {
    thSection.style.display = '';
    document.getElementById('detailThawHowText').textContent = p.thaw_how;
  } else {
    thSection.style.display = 'none';
  }

  // Spoilage
  const spSection = document.getElementById('detailSpoilage');
  const spList = document.getElementById('detailSpoilageList');
  if (p.spoilage_signs && p.spoilage_signs.length > 0) {
    spSection.style.display = '';

    spList.innerHTML = signs.map(s => `<li>${escHtml(s)}</li>`).join('');
  } else {
    spSection.style.display = 'none';
  }

  // Tips
  const tipsSection = document.getElementById('detailTips');
  const tipsList = document.getElementById('detailTipsList');
  if (p.tips && p.tips.length > 0) {
    tipsSection.style.display = '';
    tipsList.innerHTML = p.tips.map(tip => `<div class="detail-tip">"${escHtml(tip)}"</div>`).join('');

function openModal(name) {

  const sheet = document.getElementById(name + 'Sheet');
  overlay.style.display = 'block';
  requestAnimationFrame(() => {
    overlay.classList.add('visible');
    sheet.classList.add('visible');
  });
  document.body.style.overflow = 'hidden';
}

  const overlay = document.getElementById(name + 'Overlay');
  const sheet = document.getElementById(name + 'Sheet');

  overlay.classList.remove('visible');
  setTimeout(() => {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
  }, 350);
}

/* ============================================================
   FRIDGE SCREEN
   ============================================================ */
async function loadFridge() {
  State.isFridgeLoading = true;
  document.getElementById('fridgeSkeletons').style.display = 'block';
  document.getElementById('fridgeItemsList').innerHTML = '';
  document.getElementById('fridgeEmpty').style.display = 'none';

  try {
    const [items, stats] = await Promise.all([
      API.get('/api/fridge'),
      API.get('/api/fridge/stats')
    ]);
    State.fridgeItems = Array.isArray(items) ? items : (items.items || []);
    State.fridgeStats = stats;
    renderFridgeStats(stats);
    renderFridgeItems(State.fridgeItems);
    resolveTheme(stats.theme);
    updateFridgeBadge();
  } catch (e) {
    showToast(t('toast.error'));
  } finally {
    State.isFridgeLoading = false;
    document.getElementById('fridgeSkeletons').style.display = 'none';
  }
}

function renderFridgeStats(stats) {
  document.getElementById('statTotal').textContent = stats.total_items || 0;
  document.getElementById('statExpiring').textContent = stats.expiring_soon || 0;
  document.getElementById('statExpired').textContent = stats.expired || 0;
  // Theme name
  const themeName = t('themes.' + (stats.theme || 'neutral'));
  document.getElementById('fridgeThemeName').textContent = themeName;
}

function renderFridgeItems(items) {
  const container = document.getElementById('fridgeItemsList');

  if (items.length === 0) {
    container.innerHTML = '';
    document.getElementById('fridgeEmpty').style.display = 'block';
    return;
  }
  document.getElementById('fridgeEmpty').style.display = 'none';

  // Sort: expired first, then expiring, then fresh
  const sorted = [...items].sort((a, b) => {
    const order = { expired: 0, expiring_soon: 1, fresh: 2 };
    return (order[a.status] || 2) - (order[b.status] || 2);
  });

  container.innerHTML = sorted.map((item, i) => {
    const icon = item.product_icon || '🍽️';
    const name = item.product_name || 'Item';
    const daysLeft = item.days_left;
    const status = item.status || 'fresh';
    const statusClass = status === 'expired' ? 'expired' : (status === 'expiring_soon' ? 'expiring' : 'fresh');
    const daysText = status === 'expired' ? t('product.expired') : (daysLeft + ' ' + t('product.daysLeft'));
    const loc = item.location || 'fridge';
    const locLabel = t('fridge.location.' + loc);

    return `
      <div class="fridge-item fade-in" data-fridge-id="${item.id}" style="animation-delay:${i * 0.04}s">
        <span class="fridge-item-icon">${icon}</span>
        <div class="fridge-item-info">
          <div class="fridge-item-name">${escHtml(name)}</div>
          <div class="fridge-item-meta">
            <span class="fridge-item-location">${escHtml(locLabel)}</span>
            <span>${t('fridge.qty')}: ${item.quantity || 1}</span>
          </div>
        </div>
        <div class="fridge-item-right">
          <div class="fridge-days-left ${statusClass}">${daysText}</div>
          <button class="fridge-remove-btn" data-fridge-id="${item.id}" title="Remove">&times;</button>
        </div>
      </div>`;
  }).join('');

  // Remove handlers
  container.querySelectorAll('.fridge-remove-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const fid = btn.dataset.fridgeId;
      try {
        await API.del('/api/fridge/' + fid);
        showToast(t('toast.removed'), 'success');
        loadFridge();
      } catch (err) {
        showToast(t('toast.error'));
      }
    });
  });
}

async function updateFridgeBadge() {
  try {
    const stats = await API.get('/api/fridge/stats');
    const badge = document.getElementById('fridgeBadge');
    const count = (stats.expiring_soon || 0) + (stats.expired || 0);
    badge.textContent = count > 0 ? count : '';
    // Also update theme
    resolveTheme(stats.theme);
  } catch (e) {
    // Silent fail
  }
}

   RECIPES SCREEN
   ============================================================ */
function initRecipes() {
  document.getElementById('generateRecipesBtn').addEventListener('click', generateRecipes);
}

async function generateRecipes() {
  const btn = document.getElementById('generateRecipesBtn');
  btn.disabled = true;
  document.getElementById('recipesLoading').style.display = 'block';
  document.getElementById('recipesEmpty').style.display = 'none';
  document.getElementById('recipesList').innerHTML = '';

  try {
    // Get expiring items
    let expiringItems = [];
    try {
      expiringItems = await API.get('/api/fridge/expiring?days=5');
      if (!Array.isArray(expiringItems)) expiringItems = expiringItems.items || [];
    } catch (e) {
      // Fallback: get all fridge items
      const allItems = await API.get('/api/fridge');
      expiringItems = Array.isArray(allItems) ? allItems : (allItems.items || []);
    }

    if (expiringItems.length === 0) {
      document.getElementById('recipesLoading').style.display = 'none';
      document.getElementById('recipesEmpty').style.display = 'block';
      btn.disabled = false;
      return;
    }

    const productIds = expiringItems.map(item => item.product_id).filter(Boolean);
    const data = await API.post('/api/fridge/recipes', {
      product_ids: productIds,
      locale: State.locale
    });

    State.recipes = data.recipes || [];
    renderRecipes(State.recipes);
  } catch (e) {
    showToast(t('toast.error'));
    document.getElementById('recipesEmpty').style.display = 'block';
  } finally {
    document.getElementById('recipesLoading').style.display = 'none';
    btn.disabled = false;
  }
}

function renderRecipes(recipes) {
  const container = document.getElementById('recipesList');

  if (recipes.length === 0) {
    container.innerHTML = '';
    document.getElementById('recipesEmpty').style.display = 'block';
    return;
  }

  container.innerHTML = recipes.map((r, i) => {
    const num = String(i + 1).padStart(2, '0');
    const ingredients = (r.ingredients || []).map(ing => `<li>${escHtml(ing)}</li>`).join('');
    const steps = (r.steps || []).map(step => `<li>${escHtml(step)}</li>`).join('');

    return `
      <article class="recipe-card fade-in" style="animation-delay:${i * 0.06}s">
        <div class="recipe-num">${num}</div>
        <div class="recipe-title">${escHtml(r.title || 'Recipe')}</div>
        <div class="recipe-meta">
          <span class="recipe-meta-item">${r.time_minutes || '?'} ${t('recipes.time')}</span>
        </div>
        ${r.uses_expiring ? `<span class="recipe-uses-expiring">${t('recipes.usesExpiring')}</span>` : ''}
        <div class="recipe-section-label">${t('recipes.ingredients')}</div>
        <ul class="recipe-ingredients">${ingredients}</ul>
        <div class="recipe-section-label">${t('recipes.steps')}</div>
        <ol class="recipe-steps">${steps}</ol>
      </article>`;
  }).join('');
}

/* ============================================================
   PHOTO SCAN
   ============================================================ */
function initScan() {
  const fab = document.getElementById('cameraFab');
  const captureArea = document.getElementById('scanCaptureArea');
  const fileInput = document.getElementById('scanFileInput');
  const analyzeBtn = document.getElementById('scanAnalyzeBtn');
  const addAllBtn = document.getElementById('scanAddAllBtn');

  fab.addEventListener('click', () => {
    resetScanModal();
    openModal('scan');
  });

  captureArea.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    State.scanFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('scanPreview').src = ev.target.result;
      captureArea.classList.add('has-image');
      analyzeBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  analyzeBtn.addEventListener('click', () => analyzeScanPhoto());
  addAllBtn.addEventListener('click', () => addScannedItems());
}

function resetScanModal() {
  State.scanFile = null;
  State.scanResults = [];
  const captureArea = document.getElementById('scanCaptureArea');
  captureArea.classList.remove('has-image');
  document.getElementById('scanPreview').src = '';
  document.getElementById('scanAnalyzeBtn').disabled = true;
  document.getElementById('scanProgress').classList.remove('active');
  document.getElementById('scanResults').classList.remove('active');
  document.getElementById('scanComingSoon').style.display = 'none';
  document.getElementById('scanFileInput').value = '';
  document.getElementById('scanItemsList').innerHTML = '';
}

async function analyzeScanPhoto() {
  if (!State.scanFile) return;
  const progress = document.getElementById('scanProgress');
  const progressText = document.getElementById('scanProgressText');
  const analyzeBtn = document.getElementById('scanAnalyzeBtn');

  analyzeBtn.disabled = true;
  progress.classList.add('active');
  progressText.textContent = t('scan.analyzing');

  const formData = new FormData();
  formData.append('image', State.scanFile);

  try {
    const res = await API.postForm('/api/fridge/scan', formData);

    if (res.status === 404 || res.status === 501) {
      // Endpoint not available yet
      progress.classList.remove('active');
      document.getElementById('scanComingSoon').style.display = 'block';
      return;
    }

    if (!res.ok) throw new Error('Scan failed');

    // Try SSE parsing
    const contentType = res.headers.get('content-type') || '';
    if (contentType.includes('text/event-stream')) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.stage === 'analyzing') {
                progressText.textContent = t('scan.analyzing');
              } else if (data.stage === 'found') {
                progressText.textContent = `${t('scan.found')}: ${data.count || 0}`;
              } else if (data.stage === 'done' && data.items) {
                State.scanResults = data.items;
                progress.classList.remove('active');
                renderScanResults(data.items);
              }
            } catch (pe) { /* skip parse errors */ }
          }
        }
      }
    } else {
      // JSON response
      const data = await res.json();
      State.scanResults = data.items || [];
      progress.classList.remove('active');
      if (State.scanResults.length > 0) {
        renderScanResults(State.scanResults);
      } else {
        document.getElementById('scanComingSoon').style.display = 'block';
      }
    }
  } catch (e) {
    progress.classList.remove('active');
    // Show coming soon as graceful fallback
    document.getElementById('scanComingSoon').style.display = 'block';
  } finally {
    analyzeBtn.disabled = false;
  }
}

function renderScanResults(items) {
  const container = document.getElementById('scanItemsList');
  const results = document.getElementById('scanResults');
  results.classList.add('active');

  container.innerHTML = items.map((item, i) => {
    const name = item.name || item.product_name || 'Unknown';
    const icon = item.icon || item.product_icon || '🍽️';
    return `
      <div class="scan-item-row">
        <input type="checkbox" class="scan-item-check" data-idx="${i}" checked>
        <span class="scan-item-emoji">${icon}</span>
        <span class="scan-item-name">${escHtml(name)}</span>
      </div>`;
  }).join('');
}

async function addScannedItems() {
  const checks = document.querySelectorAll('.scan-item-check:checked');
  const selectedIndices = Array.from(checks).map(c => parseInt(c.dataset.idx));

  for (const idx of selectedIndices) {
    const item = State.scanResults[idx];
    if (!item) continue;
    try {
      await API.post('/api/fridge', {
        product_id: item.product_id || item.id,
        location: 'fridge',
        quantity: 1
      });
    } catch (e) {
      // Continue with others
    }
  }

  showToast(t('toast.added'), 'success');
  closeModal('scan');
  updateFridgeBadge();
}

/* ============================================================
   UTILITY
   ============================================================ */
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================================
   INITIALIZATION
   ============================================================ */
function init() {
  // Apply locale & theme
  applyI18n();
  resolveTheme('neutral');

  // Init modules
  initSearch();
  initModals();
  initRecipes();
  initSettings();
  initScan();

  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => navigateTo(item.dataset.screen));
  });

  // Load initial data
  loadCategories();
  loadProducts();
  updateFridgeBadge();

  // Set search screen as default
  navigateTo('search');
}

// Start
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
<script>
/* Telegram Mini App bootstrap — silent no-op outside Telegram */
(function () {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (!tg || !tg.initData) return;

  document.body.classList.add('tg-webapp');
  try { tg.ready(); } catch (_) {}
  try { tg.expand(); } catch (_) {}

  /* Stable viewport height — fixes iOS bounce + keyboard layout shift */
  const syncHeight = () => {
    const h = tg.viewportStableHeight || tg.viewportHeight || window.innerHeight;
    document.documentElement.style.setProperty('--tg-viewport-stable-height', h + 'px');
  };
  syncHeight();
  tg.onEvent && tg.onEvent('viewportChanged', syncHeight);
  window.addEventListener('resize', syncHeight);

  /* BackButton — shown on any hash route or deep-linked state. */
  const back = tg.BackButton;
  const updateBack = () => {
    const hasRoute = location.hash && location.hash !== '#' && location.hash !== '#/';
    (hasRoute || (history.state && history.state.__tgDeep)) ? back.show() : back.hide();
  };
  back.onClick(() => {
    if (location.hash || (history.state && history.state.__tgDeep)) history.back();
    else tg.close();
  });
  window.addEventListener('hashchange', updateBack);
  window.addEventListener('popstate', updateBack);
  updateBack();

  /* Haptics — window.tgHaptic('success'|'error'|'warning'|
                                'light'|'medium'|'heavy'|'rigid'|'soft'|'tick') */
  window.tgHaptic = function (kind) {
    const hf = tg.HapticFeedback;
    if (!hf) return;
    try {
      if (kind === 'success' || kind === 'error' || kind === 'warning') hf.notificationOccurred(kind);
      else if (kind === 'light' || kind === 'medium' || kind === 'heavy' ||
               kind === 'rigid' || kind === 'soft') hf.impactOccurred(kind);
      else hf.selectionChanged();
    } catch (_) {}
  };

  /* Closing confirmation — call window.tgConfirmClose(true) when user has unsaved work */
  window.tgConfirmClose = function (on) {
    try { on ? tg.enableClosingConfirmation() : tg.disableClosingConfirmation(); } catch (_) {}
  };

  /* Expose user + signed initData for backend HMAC verification */
  window.tgUser = (tg.initDataUnsafe && tg.initDataUnsafe.user) || null;
  window.tgInitData = tg.initData;

  document.dispatchEvent(new CustomEvent('tg:ready', {
    detail: { tg: tg, user: window.tgUser, platform: tg.platform, colorScheme: tg.colorScheme }
  }));
})();
</script>
